services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: rod_system
      POSTGRES_USER: rod
      POSTGRES_PASSWORD: rod
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://rod:rod@postgres:5432/rod_system
      REDIS_URL: redis://redis:6379/0
      TRAINING_DB_URL: postgresql+psycopg://rod:rod@postgres:5432/rod_system
    depends_on:
      - postgres
      - redis
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"

  backend-worker:
    build:
      context: ./apps/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://rod:rod@postgres:5432/rod_system
      REDIS_URL: redis://redis:6379/0
      TRAINING_DB_URL: postgresql+psycopg://rod:rod@postgres:5432/rod_system
    depends_on:
      - postgres
      - redis
    volumes:
      - backend_data:/app/data
    command: celery -A app.celery_app:celery_app worker -l info

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  training-dashboard:
    build:
      context: ./apps/training-dashboard
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./apps/training-dashboard:/app
      - training_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web
      - training-dashboard
    ports:
      - "80:80"

volumes:
  web_node_modules:
  training_node_modules:
  backend_data:

[tool.black]
line-length = 100
target-version = ["py312"]
include = "\\.pyi?$"
exclude = '''
/(
    \.venv
  | build
  | dist
  | \.pytest_cache
  | node_modules
)/
'''

[tool.isort]
profile = "black"
line_length = 100
src_paths = ["apps/backend/app", "apps/backend/tests"]

[tool.mypy]
python_version = "3.12"
strict = false
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = "(^\\.venv/|^node_modules/|^apps/.*/node_modules/)"
